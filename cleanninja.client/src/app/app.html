<header class="app-header">
  <div class="container header-container">
    <div class="logo">
      <a routerLink="/"><img src="assets/images/CleanNinjaWB.png" alt="Clean Ninja Logo" style="height: 50px; vertical-align: middle;"></a>
    </div>
    <nav class="nav-links">
      <a routerLink="/">Home</a>
      <a routerLink="/booking" class="btn-primary" style="padding: 8px 16px;">Book Now</a>
    </nav>
  </div>
</header>
<main class="app-main">
  <router-outlet></router-outlet>
</main>

<!-- PWA Install Banner -->
<div *ngIf="showInstallButton" class="pwa-install-banner">
  <div class="pwa-install-content">
    <img src="assets/images/icon-192x192.png" alt="Clean Ninja" class="pwa-icon">
    <div class="pwa-text">
      <strong>Install Clean Ninja</strong>
      <span>Add to your home screen for the best experience</span>
    </div>
  </div>
  <div class="pwa-actions">
    <button (click)="showInstallButton = false" class="pwa-dismiss">✕</button>
    <button (click)="installPwa()" class="btn-primary pwa-install-btn">Install</button>
  </div>
</div>
