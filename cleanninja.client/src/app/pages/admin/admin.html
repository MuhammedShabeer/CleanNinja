<div class="admin-theme">
  <c-sidebar #sidebar="cSidebar" [visible]="sidebarVisible" [unfoldable]="false" id="sidebar" colorScheme="dark">
    <c-sidebar-brand class="d-md-flex align-items-center justify-content-center py-4 px-3 border-bottom border-secondary border-opacity-10 d-sm-flex">
      <img src="favicon.png" height="32" class="me-2 rounded shadow-sm">
      <span class="fw-bold tracking-wider">CLEAN NINJA</span>
    </c-sidebar-brand>
    <c-sidebar-nav>
      <c-nav-item *ngIf="hasAccess('dashboard')">
        <a cNavLink routerLink="/admin/dashboard" routerLinkActive="active">
          <svg cIcon name="cilSpeedometer" class="nav-icon"></svg> Dashboard
        </a>
      </c-nav-item>
      <c-nav-item *ngIf="hasAccess('bookings')">
        <a cNavLink routerLink="/admin/bookings" routerLinkActive="active">
          <svg cIcon name="cilList" class="nav-icon"></svg> Bookings
        </a>
      </c-nav-item>
      <c-nav-item *ngIf="hasAccess('works')">
        <a cNavLink routerLink="/admin/works" routerLinkActive="active">
          <svg cIcon name="cilTask" class="nav-icon"></svg> Works
        </a>
      </c-nav-item>
      <c-nav-item *ngIf="hasAccess('schedules')">
        <a cNavLink routerLink="/admin/schedules" routerLinkActive="active">
          <svg cIcon name="cilTask" class="nav-icon"></svg> Schedules
        </a>
      </c-nav-item>
      <c-nav-item *ngIf="hasAccess('calendar')">
        <a cNavLink routerLink="/admin/calendar" routerLinkActive="active">
          <svg cIcon name="cilCalendar" class="nav-icon"></svg> Calendar
        </a>
      </c-nav-item>
      <c-nav-item *ngIf="hasAccess('revenue')">
        <a cNavLink routerLink="/admin/revenue" routerLinkActive="active">
          <svg cIcon name="cilDollar" class="nav-icon"></svg> Revenue
        </a>
      </c-nav-item>
      <c-nav-item *ngIf="hasAccess('employees')">
        <a cNavLink routerLink="/admin/employees" routerLinkActive="active">
          <svg cIcon name="cilPeople" class="nav-icon"></svg> Employees
        </a>
      </c-nav-item>
      <c-nav-item *ngIf="hasAccess('services')">
        <a cNavLink routerLink="/admin/services" routerLinkActive="active">
          <svg cIcon name="cilSettings" class="nav-icon"></svg> Services
        </a>
      </c-nav-item>
      <c-nav-item *ngIf="hasAccess('gallery')">
        <a cNavLink routerLink="/admin/gallery" routerLinkActive="active">
          <svg cIcon name="cilImage" class="nav-icon"></svg> Gallery
        </a>
      </c-nav-item>
      <c-nav-item *ngIf="hasAccess('content')">
        <a cNavLink routerLink="/admin/content" routerLinkActive="active">
          <svg cIcon name="cilSettings" class="nav-icon"></svg> Content
        </a>
      </c-nav-item>
      <c-nav-item *ngIf="hasAccess('users')">
        <a cNavLink routerLink="/admin/users" routerLinkActive="active">
          <svg cIcon name="cilUser" class="nav-icon"></svg> Admin Users
        </a>
      </c-nav-item>
    </c-sidebar-nav>
  </c-sidebar>

  <div class="wrapper d-flex flex-column min-vh-100 bg-light dark:bg-transparent">
    <c-header class="mb-4 d-print-none shadow-sm" position="sticky">
      <div class="header-main w-100 bg-white">
        <c-container fluid class="d-flex align-items-center justify-content-between h-100">
          <div class="d-flex align-items-center">
              <button cHeaderToggler class="ps-1 me-3 border-0 bg-transparent" (click)="sidebarVisible = !sidebarVisible">
                <svg cIcon name="cilMenu" size="lg"></svg>
              </button>
              <span class="fw-semibold text-dark fs-5">Dash<span class="d-none d-sm-inline">board</span></span>
          </div>
          
          <div class="d-flex align-items-center">
            <span class="me-3 d-none d-md-inline text-muted small">Welcome, <strong>{{ adminName }}</strong></span>
            <button cButton color="danger" variant="ghost" size="sm" (click)="logout()" title="Logout" class="rounded-pill">
              <svg cIcon name="cilAccountLogout" size="lg"></svg>
            </button>
          </div>
        </c-container>
      </div>
      <div class="header-divider h-1px bg-light"></div>
      <div class="header-breadcrumb w-100 bg-white py-2">
        <c-container fluid>
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb m-0 ms-2 small fw-medium">
              <li class="breadcrumb-item text-secondary align-items-center d-flex">
                  <svg cIcon name="cilInfo" size="sm" class="me-1"></svg> Home
              </li>
              <li class="breadcrumb-item active" aria-current="page">Admin</li>
            </ol>
          </nav>
        </c-container>
      </div>
    </c-header>

    <div class="body flex-grow-1 px-3">
      <c-container breakpoint="lg">
        <router-outlet></router-outlet>
      </c-container>
    </div>
  </div>
</div>
