<c-row>
  <c-col [md]="4">
    <c-card class="mb-4">
      <c-card-header><strong>Add Employee</strong></c-card-header>
      <c-card-body>
        <div class="mb-3">
          <label cLabel>Full Name</label>
          <input cFormControl type="text" [(ngModel)]="newEmployee.name" placeholder="Full Name" />
        </div>
        <div class="mb-3">
          <label cLabel>Phone</label>
          <input cFormControl type="text" [(ngModel)]="newEmployee.phone" placeholder="Phone" />
        </div>
        <div class="mb-3">
          <label cLabel>Role</label>
          <input cFormControl type="text" [(ngModel)]="newEmployee.role" placeholder="Role (e.g. Car Wash)" />
        </div>
        <button cButton color="primary" class="w-100" (click)="addEmployee()">
          <svg cIcon name="cilPlus" class="me-2"></svg> Add Employee
        </button>
      </c-card-body>
    </c-card>
  </c-col>
  <c-col [md]="8">
    <c-card>
      <c-card-header><strong>Current Ninja Staff</strong> ({{ employees.length }})</c-card-header>
      <c-card-body>
        <table cTable hover responsive [striped]="true">
          <thead>
            <tr>
              <th>Name</th>
              <th>Role</th>
              <th>Phone</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let e of employees">
              <td><strong>{{ e.name }}</strong></td>
              <td><span cBadge color="secondary">{{ e.role }}</span></td>
              <td>📞 {{ e.phone }}</td>
              <td>
                <button cButton size="sm" [color]="e.isActive ? 'success' : 'secondary'" (click)="toggleEmployeeActive(e)">
                  {{ e.isActive ? 'Active' : 'Inactive' }}
                </button>
              </td>
              <td>
                <button cButton color="danger" variant="outline" size="sm" (click)="removeEmployee(e.id)">
                  <svg cIcon name="cilTrash"></svg>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
        <p *ngIf="employees.length === 0" class="text-center py-3 text-medium-emphasis">No employees added yet.</p>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>
