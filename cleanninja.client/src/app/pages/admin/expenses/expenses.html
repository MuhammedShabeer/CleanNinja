<c-container fluid class="p-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold text-dark">Expense Tracking</h3>
  </div>

  <div class="row g-4">
    <!-- Add Expense Form -->
    <div class="col-md-4">
      <c-card class="border-0 shadow-sm mb-4">
        <c-card-header class="bg-dark text-white border-0 py-3">
          <strong>Add New Expense</strong>
        </c-card-header>
        <c-card-body class="p-4">
          <div class="mb-3">
            <label class="form-label small text-muted text-uppercase fw-bold">Description</label>
            <input cFormControl placeholder="e.g. Cleaning Supplies" [(ngModel)]="newExpense.description">
          </div>

          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label small text-muted text-uppercase fw-bold">Amount (£)</label>
              <input cFormControl type="number" placeholder="0.00" [(ngModel)]="newExpense.amount">
            </div>
            <div class="col-6">
              <label class="form-label small text-muted text-uppercase fw-bold">Category</label>
              <select cSelect [(ngModel)]="newExpense.category">
                <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
              </select>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label small text-muted text-uppercase fw-bold">Transaction Date</label>
            <input cFormControl type="date" [(ngModel)]="newExpense.date">
          </div>

          <button cButton color="primary" class="w-100 py-2 shadow-sm" (click)="addExpense()">
            <svg cIcon name="cilSave" class="me-2"></svg> Save Expense
          </button>
        </c-card-body>
      </c-card>
    </div>

    <!-- Expense History Table -->
    <div class="col-md-8">
      <c-card class="border-0 shadow-sm overflow-hidden">
        <c-card-header class="bg-light border-0 py-3">
          <strong>Expense History</strong>
        </c-card-header>
        <c-card-body class="p-0">
          <div class="table-responsive">
            <table cTable [hover]="true" [align]="'middle'" class="mb-0">
              <thead class="bg-light">
                <tr>
                  <th class="px-4 py-3 border-0">Description</th>
                  <th class="py-3 border-0 text-center">Category</th>
                  <th class="py-3 border-0 text-center">Date</th>
                  <th class="py-3 border-0 text-end">Amount</th>
                  <th class="px-4 py-3 border-0 text-end">Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let ex of expenses">
                  <td class="px-4 fw-medium">{{ ex.description }}</td>
                  <td class="text-center">
                    <c-badge color="secondary" class="bg-opacity-10 text-dark border-0 px-3 py-2 rounded-pill">
                      {{ ex.category }}
                    </c-badge>
                  </td>
                  <td class="text-center text-muted small">{{ ex.date | date:'mediumDate' }}</td>
                  <td class="text-end fw-bold text-danger">£{{ ex.amount | number:'1.2-2' }}</td>
                  <td class="px-4 text-end">
                    <button cButton color="danger" variant="outline" size="sm" (click)="deleteExpense(ex.id)">
                      <svg cIcon name="cilTrash"></svg>
                    </button>
                  </td>
                </tr>
                <tr *ngIf="expenses.length === 0">
                  <td colspan="5" class="text-center py-5 text-muted">
                    <div class="mb-2"><svg cIcon name="cilInfo" size="xl"></svg></div>
                    No expenses recorded yet.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </c-card-body>
      </c-card>
    </div>
  </div>
</c-container>
